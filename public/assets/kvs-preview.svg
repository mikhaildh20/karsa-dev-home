<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Kanban Verification System preview</title>
  <desc id="desc">Dark Kanban verification dashboard preview with OQC, Double Check, and Barcode Delivery Scan workflow cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07120d"/>
      <stop offset="0.5" stop-color="#0d1828"/>
      <stop offset="1" stop-color="#17203a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#65a8ff"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="26" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.29 0 0 0 0 0.87 0 0 0 0 0.50 0 0 0 .55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="146" cy="112" r="190" fill="#4ade80" opacity=".18" filter="url(#glow)"/>
  <circle cx="1030" cy="120" r="220" fill="#65a8ff" opacity=".15" filter="url(#glow)"/>
  <rect x="74" y="72" width="1052" height="576" rx="34" fill="rgba(255,255,255,.055)" stroke="rgba(255,255,255,.15)"/>
  <rect x="110" y="112" width="980" height="80" rx="24" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.14)"/>
  <circle cx="154" cy="152" r="18" fill="#4ade80"/>
  <text x="196" y="162" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="850" fill="#f0fff6">Kanban Verification System</text>
  <text x="790" y="160" font-family="JetBrains Mono,Consolas,monospace" font-size="20" fill="#9fb0c8">OQC • DC • BDS</text>
  <g transform="translate(110 238)">
    <rect width="286" height="328" rx="28" fill="rgba(74,222,128,.10)" stroke="rgba(74,222,128,.34)"/>
    <rect x="28" y="32" width="84" height="38" rx="19" fill="url(#green)"/>
    <text x="70" y="57" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#06120d">OQC</text>
    <text x="28" y="118" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="850" fill="#f1fff6">Quality Check</text>
    <text x="28" y="158" font-family="Inter,Arial,sans-serif" font-size="19" fill="#aac4b5">QR label verification and</text>
    <text x="28" y="184" font-family="Inter,Arial,sans-serif" font-size="19" fill="#aac4b5">inspection traceability.</text>
    <rect x="28" y="232" width="230" height="22" rx="11" fill="rgba(255,255,255,.12)"/>
    <rect x="28" y="232" width="174" height="22" rx="11" fill="#4ade80"/>
    <text x="28" y="286" font-family="JetBrains Mono,Consolas,monospace" font-size="18" fill="#cdebd8">status: verified</text>
  </g>
  <g transform="translate(456 238)">
    <rect width="286" height="328" rx="28" fill="rgba(101,168,255,.10)" stroke="rgba(101,168,255,.34)"/>
    <rect x="28" y="32" width="74" height="38" rx="19" fill="#65a8ff"/>
    <text x="65" y="57" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#06111f">DC</text>
    <text x="28" y="118" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="850" fill="#eef6ff">Double Check</text>
    <text x="28" y="158" font-family="Inter,Arial,sans-serif" font-size="19" fill="#afc1da">Operator workflow for</text>
    <text x="28" y="184" font-family="Inter,Arial,sans-serif" font-size="19" fill="#afc1da">step-by-step validation.</text>
    <g stroke="#65a8ff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M42 244l28 28 58-72"/>
      <path d="M144 244l28 28 58-72" opacity=".65"/>
    </g>
  </g>
  <g transform="translate(802 238)">
    <rect width="286" height="328" rx="28" fill="rgba(255,255,255,.075)" stroke="rgba(255,255,255,.16)"/>
    <rect x="28" y="32" width="82" height="38" rx="19" fill="#ffb86b"/>
    <text x="69" y="57" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#1b1004">BDS</text>
    <text x="28" y="118" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="850" fill="#fff8ee">Delivery Scan</text>
    <text x="28" y="158" font-family="Inter,Arial,sans-serif" font-size="19" fill="#cbbba8">Barcode delivery scan</text>
    <text x="28" y="184" font-family="Inter,Arial,sans-serif" font-size="19" fill="#cbbba8">reports and status locks.</text>
    <g fill="#fff8ee">
      <rect x="30" y="230" width="12" height="70"/>
      <rect x="52" y="230" width="7" height="70"/>
      <rect x="70" y="230" width="18" height="70"/>
      <rect x="100" y="230" width="8" height="70"/>
      <rect x="122" y="230" width="22" height="70"/>
      <rect x="158" y="230" width="10" height="70"/>
      <rect x="184" y="230" width="16" height="70"/>
      <rect x="214" y="230" width="8" height="70"/>
      <rect x="238" y="230" width="18" height="70"/>
    </g>
  </g>
</svg>
